<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Авторизация</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon" />
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/fontawesome-free/css/all.min.css') }}">
  <meta name="robots" content="noindex, nofollow" />
</head>

<body class="d-flex justify-content-center align-items-center full-height">

  <div class="login-wrapper">
    <h1 class="text-center login-title">Авторизация</h1>
    <form method="post" action="" autocomplete="on">
      {{ form.hidden_tag() }}

      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="username" placeholder="Имя пользователя" name="username" required
          maxlength="20" autocomplete="username" />
        <label for="username">Имя пользователя</label>
      </div>

      <div class="form-floating mb-3 position-relative">
        <input type="password" class="form-control" id="password" placeholder="Пароль" name="password" required
          autocomplete="current-password" />
        <label for="password">Пароль</label>
        <span class="position-absolute top-50 end-0 translate-middle-y me-3"
          onmousedown="showPassword()" onmouseup="hidePassword()" ontouchstart="showPassword()" ontouchend="hidePassword()"
          style="cursor: pointer; color: gray;"><i class="fas fa-eye" id="togglePasswordIcon"></i></span>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="form-check m-0">
          {{ form.remember_me(class="form-check-input", id="remember_me") }}
          <label for="remember_me" class="form-check-label">Запомнить меня</label>
        </div>
        <a href="#" class="text-muted text-decoration-none ms-3" onclick="showPasswordHint(event)">Забыли пароль?</a>
      </div>

      
      <div style="display: none;">
        <input type="text" name="email_confirmation" value="">
      </div>

      {% if error_message %}
      <div class="alert alert-danger" role="alert">{{ error_message }}</div>
      {% endif %}

        <button class="w-100 btn btn-lg btn-primary mb-3" type="submit" id="submit">Вход</button>
        <p id="passwordHint" class="text-muted forgot-password-link text-center">
          Для смены пароля обратитесь к администратору системы.
        </p>
    </form>
  </div>

  <script src="{{ url_for('static', filename='js/login_page.js') }}"></script>
  <script>
    (function () {
      const STORAGE_KEY = "loginRateLimitState";
      const MAX_DELAY_SECONDS = 60;
      const hasLoginError = {{ "true" if error_message else "false" }};
      const DEFAULT_SUBMIT_TEXT = "Вход";

      function getState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            return { failedAttempts: 0, nextAllowedAt: 0 };
          }
          const parsed = JSON.parse(raw);
          const failedAttempts = Number(parsed.failedAttempts) || 0;
          const nextAllowedAt = Number(parsed.nextAllowedAt) || 0;
          return { failedAttempts, nextAllowedAt };
        } catch (e) {
          return { failedAttempts: 0, nextAllowedAt: 0 };
        }
      }

      function saveState(state) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function getDelaySeconds(failedAttempts) {
        if (failedAttempts <= 1) {
          return 0;
        }
        return Math.min(2 ** (failedAttempts - 2), MAX_DELAY_SECONDS);
      }

      function formatButtonText(seconds) {
        return "Вход " + seconds + " сек...";
      }

      document.addEventListener("DOMContentLoaded", function () {
        const form = document.querySelector("form");
        const submitButton = document.getElementById("submit");
        if (!form || !submitButton) {
          return;
        }

        const state = getState();

        if (hasLoginError) {
          state.failedAttempts += 1;
          const delaySeconds = getDelaySeconds(state.failedAttempts);
          state.nextAllowedAt = delaySeconds > 0 ? Date.now() + delaySeconds * 1000 : 0;
          saveState(state);
        }

        let timerId = null;

        function refreshLockState() {
          const now = Date.now();
          const remainingMs = state.nextAllowedAt - now;
          if (remainingMs > 0) {
            const remainingSeconds = Math.ceil(remainingMs / 1000);
            submitButton.disabled = true;
            submitButton.textContent = formatButtonText(remainingSeconds);
          } else {
            submitButton.disabled = false;
            submitButton.textContent = DEFAULT_SUBMIT_TEXT;
            state.nextAllowedAt = 0;
            saveState(state);
            if (timerId) {
              clearInterval(timerId);
              timerId = null;
            }
          }
        }

        if (state.nextAllowedAt > Date.now()) {
          refreshLockState();
          timerId = setInterval(refreshLockState, 250);
        } else {
          submitButton.textContent = DEFAULT_SUBMIT_TEXT;
        }

        form.addEventListener("submit", function (event) {
          if (Date.now() < state.nextAllowedAt) {
            event.preventDefault();
            refreshLockState();
            if (!timerId) {
              timerId = setInterval(refreshLockState, 250);
            }
          }
        });
      });
    })();
  </script>

</body>

</html>
